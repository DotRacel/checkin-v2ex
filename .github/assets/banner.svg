<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="V2EX 每日签到 — 自动签到 · Docker 部署 · 消息推送">
  <defs>
    <!-- V2EX-inspired dark teal → deep navy gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1c4a41"/>
      <stop offset="0.45" stop-color="#12302f"/>
      <stop offset="1" stop-color="#0d161b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#0fb37f"/>
    </linearGradient>
    <linearGradient id="wordmark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#cfe8e0"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <clipPath id="round"><rect width="1200" height="300" rx="20"/></clipPath>
  </defs>

  <g clip-path="url(#round)">
    <rect width="1200" height="300" fill="url(#bg)"/>

    <!-- ambient glows -->
    <circle cx="1050" cy="40" r="220" fill="#2ee6a6" opacity="0.06"/>
    <circle cx="120" cy="300" r="200" fill="#2ee6a6" opacity="0.05"/>

    <!-- faint tech grid on the right -->
    <g stroke="#7fe9c9" stroke-width="1" opacity="0.06">
      <path d="M760 0V300 M840 0V300 M920 0V300 M1000 0V300 M1080 0V300 M1160 0V300"/>
      <path d="M760 60H1200 M760 120H1200 M760 180H1200 M760 240H1200"/>
    </g>

    <!-- accent edge -->
    <rect x="0" y="0" width="8" height="300" fill="url(#accent)"/>

    <!-- ===== Left: brand ===== -->
    <g font-family="'Helvetica Neue', Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif">
      <!-- V2EX wordmark -->
      <text x="72" y="128" font-size="92" font-weight="800" letter-spacing="2"
            fill="url(#wordmark)" filter="url(#soft)">V2EX</text>

      <!-- daily check-in title (CJK) -->
      <text x="78" y="196" font-size="46" font-weight="700" fill="#eafaf3"
            font-family="'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', sans-serif">每日自动签到</text>

      <!-- english subtitle -->
      <text x="80" y="240" font-size="20" font-weight="500" letter-spacing="3"
            fill="#7fe9c9" opacity="0.9">AUTOMATED&#160;&#160;DAILY&#160;&#160;CHECK-IN</text>
    </g>

    <!-- "way to explore"-style pill -->
    <g transform="translate(80,258)">
      <rect x="0" y="0" width="352" height="30" rx="8" fill="#0c1418" opacity="0.85"/>
      <text x="16" y="21" font-size="16" font-weight="500" fill="#c9d6d1"
            font-family="'PingFang SC', 'Microsoft YaHei', sans-serif">配置一次 Cookie · 之后每天自动领取奖励</text>
    </g>

    <!-- ===== Right: check badge + feature chips ===== -->
    <!-- glowing check seal -->
    <g transform="translate(1000,150)" filter="url(#soft)">
      <circle r="70" fill="#0c1c1a" stroke="url(#accent)" stroke-width="4"/>
      <circle r="70" fill="none" stroke="#34d399" stroke-width="4" opacity="0.25">
        <animate attributeName="r" values="70;92;70" dur="3s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.28;0;0.28" dur="3s" repeatCount="indefinite"/>
      </circle>
      <path d="M-30 2 L-8 26 L34 -24" fill="none" stroke="url(#accent)"
            stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- feature chips -->
    <g font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="17" font-weight="600">
      <g transform="translate(690,74)">
        <rect width="188" height="38" rx="19" fill="#ffffff" opacity="0.06"/>
        <rect width="188" height="38" rx="19" fill="none" stroke="#34d399" stroke-width="1" opacity="0.35"/>
        <circle cx="26" cy="19" r="4" fill="#34d399"/>
        <text x="44" y="25" fill="#eafaf3">全自动签到</text>
      </g>
      <g transform="translate(690,131)">
        <rect width="188" height="38" rx="19" fill="#ffffff" opacity="0.06"/>
        <rect width="188" height="38" rx="19" fill="none" stroke="#34d399" stroke-width="1" opacity="0.35"/>
        <circle cx="26" cy="19" r="4" fill="#34d399"/>
        <text x="44" y="25" fill="#eafaf3">Docker 一键部署</text>
      </g>
      <g transform="translate(690,188)">
        <rect width="188" height="38" rx="19" fill="#ffffff" opacity="0.06"/>
        <rect width="188" height="38" rx="19" fill="none" stroke="#34d399" stroke-width="1" opacity="0.35"/>
        <circle cx="26" cy="19" r="4" fill="#34d399"/>
        <text x="44" y="25" fill="#eafaf3">结果消息推送</text>
      </g>
    </g>
  </g>
</svg>
